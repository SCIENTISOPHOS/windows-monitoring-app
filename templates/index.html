<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <header class="d-flex flex-wrap align-items-center justify-content-between mb-4">
      <h1 class="h3">Weather Dashboard</h1>
      <form id="searchForm" class="d-flex" onsubmit="return false;">
        <input id="cityInput" class="form-control me-2" type="search" placeholder="Enter city (e.g. Paris)" aria-label="Search">
        <button id="searchBtn" class="btn btn-primary">Search</button>
      </form>
    </header>

    <div id="alertPlaceholder"></div>

    <div id="mainContent" style="display:none;">
      <div class="row mb-3">
        <div class="col-md-6">
          <div class="card mb-3">
            <div class="card-body">
              <h5 id="cityName" class="card-title"></h5>
              <p id="currentDesc" class="text-muted mb-1"></p>
              <div class="d-flex align-items-end justify-content-between">
                <div>
                  <div id="currentTemp" class="display-5 fw-bold"></div>
                  <div id="feelsLike" class="text-muted"></div>
                </div>
                <div id="weatherIcon" class="text-end"></div>
              </div>
              <hr>
              <div class="row">
                <div class="col-4"><small>Humidity</small><div id="humidity"></div></div>
                <div class="col-4"><small>Wind</small><div id="wind"></div></div>
                <div class="col-4"><small>Min / Max</small><div id="minmax"></div></div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <h6>Forecast (next entries)</h6>
              <div id="forecastList" class="d-flex gap-2 overflow-auto py-2"></div>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card h-100">
            <div class="card-body">
              <h6>Temperature (next hours)</h6>
              <canvas id="tempChart" height="220"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center text-muted small mt-4">
      Data provided by OpenWeatherMap
    </footer>
  </div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
